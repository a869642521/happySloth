<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Video Card Overlay Demo</title>
    <style>
      :root {
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: #171717;
        background: #f5f2ec;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        padding: 18px 28px;
        border-bottom: 1px solid #ded8cd;
        background: rgba(245, 242, 236, 0.92);
        backdrop-filter: blur(12px);
      }

      h1 {
        margin: 0;
        font-size: 20px;
        letter-spacing: 0;
      }

      .sample {
        max-width: 520px;
        overflow: hidden;
        color: #47433b;
        font-size: 13px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px;
      }

      .grid {
        columns: 4 210px;
        column-gap: 18px;
      }

      .card {
        display: inline-block;
        width: 100%;
        margin: 0 0 18px;
        break-inside: avoid;
      }

      .art {
        display: grid;
        min-height: var(--h);
        place-items: center;
        overflow: hidden;
        border-radius: 16px;
        color: #fff;
        background:
          radial-gradient(circle at 30% 20%, rgba(255, 255, 255, 0.58), transparent 28%),
          linear-gradient(135deg, var(--a), var(--b));
        box-shadow: 0 14px 34px rgba(56, 49, 40, 0.18);
      }

      .art span {
        max-width: 78%;
        font-size: 28px;
        font-weight: 850;
        line-height: 1;
        text-align: center;
      }

      .caption {
        margin: 9px 4px 0;
        font-size: 14px;
        font-weight: 750;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>卡片测试页</h1>
      <div class="sample">
        测试视频：https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4
      </div>
    </header>
    <main>
      <section class="grid" aria-label="测试卡片">
        <article class="card">
          <div class="art" style="--h: 260px; --a: #e8557a; --b: #f2b35e"><span>Card 01</span></div>
          <p class="caption">适合覆盖的短卡片</p>
        </article>
        <article class="card">
          <div class="art" style="--h: 380px; --a: #317873; --b: #8ab17d"><span>Card 02</span></div>
          <p class="caption">高一点的竖图卡片</p>
        </article>
        <article class="card">
          <div class="art" style="--h: 220px; --a: #5f6caf; --b: #58a4b0"><span>Card 03</span></div>
          <p class="caption">横向比例测试</p>
        </article>
        <article class="card">
          <div class="art" style="--h: 320px; --a: #a44a3f; --b: #f19c79"><span>Card 04</span></div>
          <p class="caption">滚动同步测试</p>
        </article>
        <article class="card">
          <div class="art" style="--h: 440px; --a: #6c5b7b; --b: #355c7d"><span>Card 05</span></div>
          <p class="caption">大卡片测试</p>
        </article>
        <article class="card">
          <div class="art" style="--h: 280px; --a: #2f4858; --b: #86bbd8"><span>Card 06</span></div>
          <p class="caption">圆角继承测试</p>
        </article>
        <article class="card">
          <div class="art" style="--h: 350px; --a: #6a994e; --b: #bc4749"><span>Card 07</span></div>
          <p class="caption">保存位置测试</p>
        </article>
        <article class="card">
          <div class="art" style="--h: 240px; --a: #264653; --b: #e9c46a"><span>Card 08</span></div>
          <p class="caption">最后一个卡片</p>
        </article>
      </section>
    </main>
  </body>
</html>
